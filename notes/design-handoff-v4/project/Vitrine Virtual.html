*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ─── Motion System ─── */
:root{
  /* Durations */
  --t-instant:80ms; --t-fast:160ms; --t-base:240ms; --t-slow:380ms; --t-deliberate:560ms; --t-cinematic:900ms;
  /* Easings */
  --e-out:cubic-bezier(.22,.61,.36,1);          /* default UI */
  --e-out-soft:cubic-bezier(.32,.72,0,1);        /* drawer, sheet */
  --e-spring:cubic-bezier(.34,1.56,.64,1);       /* playful pop */
  --e-in:cubic-bezier(.55,.06,.68,.19);
  --e-inout:cubic-bezier(.65,0,.35,1);
  /* Stagger step */
  --stagger:55ms;
  /* Motion intensity scale (set by JS via data-motion attr) */
  --motion-scale:1;
}
[data-motion="calm"]{--motion-scale:.7;--stagger:40ms}
[data-motion="playful"]{--motion-scale:1.25;--stagger:75ms}
[data-motion="off"] *,[data-motion="off"] *::before,[data-motion="off"] *::after{
  animation-duration:1ms!important;animation-delay:0s!important;transition-duration:1ms!important;
}

@keyframes vv-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes vv-bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
@keyframes vv-fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

@keyframes vv-pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes vv-breathe{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.04);opacity:.9}}
@keyframes vv-shimmer{from{background-position:-200% 0}to{background-position:200% 0}}
@keyframes vv-blur-in{from{opacity:0;filter:blur(14px);transform:scale(1.04)}to{opacity:1;filter:blur(0);transform:scale(1)}}
@keyframes vv-reveal-up{from{opacity:0;transform:translateY(22px) scale(.985)}to{opacity:1;transform:translateY(0) scale(1)}}

@keyframes vv-shine{from{transform:translateX(-110%)}to{transform:translateX(220%)}}
@keyframes vv-draw{from{stroke-dashoffset:60}to{stroke-dashoffset:0}}
@keyframes vv-orbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes vv-tab-cross{from{opacity:0;transform:translateY(6px) scale(.995)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes vv-toast{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes vv-marquee-fade{0%,100%{opacity:.45}50%{opacity:1}}
@keyframes vv-step-fill{from{background-position:right center}to{background-position:left center}}

/* Stagger helper: child gets --i index, animates with cumulative delay */
.vv-stagger>*{opacity:0;animation:vv-reveal-up calc(var(--t-base)*var(--motion-scale)) var(--e-out) both;animation-delay:calc(var(--i,0) * var(--stagger))}
.vv-fade-in{animation:vv-fade-in calc(var(--t-base)*var(--motion-scale)) var(--e-out) both}
.vv-reveal{animation:vv-reveal-up calc(var(--t-deliberate)*var(--motion-scale)) var(--e-out) both}
.vv-blur-in{animation:vv-blur-in calc(var(--t-cinematic)*var(--motion-scale)) var(--e-out) both}
.vv-breathe{animation:vv-breathe 3.6s var(--e-inout) infinite}
.vv-orbit{animation:vv-orbit 8s linear infinite}

.vv-marquee-fade{animation:vv-marquee-fade 2.4s var(--e-inout) infinite}

/* Tab content cross-fade */

/* Reduced motion */

<!-- ① Tokens + shared primitives -->
<script type="text/babel">
const C={
  bg:'#faf7f3',surface:'#ffffff',surface2:'#f5f0ea',surface3:'#ede6dc',

const F={serif:"'Bodoni Moda','Didot','Bodoni 72',Georgia,serif",sans:"'Manrope',ui-sans-serif,system-ui,sans-serif",mono:"'JetBrains Mono','SF Mono',ui-monospace,monospace"};

const CATEGORIAS=[

  {id:'vestidos',label:'Vestidos'},{id:'saias',label:'Saias'},

function getCatLabel(id){const c=CATEGORIAS.find(x=>x.id===id);return c?c.label:id;}
function trunc(str,max=32){if(!str)return'';return str.length>max?str.slice(0,max-1)+'…':str;}
function formatPrice(c){return'R$ '+(c/100).toFixed(2).replace('.',',');}

// Brand mark — "vv" minúsculo itálico em serif: a identidade da Vitrine Virtual.
// Quadrado preto com vv branco (dark=true / default) ou inverso (dark=false).
function VVLogo({size=28,dark=true,showWordmark=false}){
  const bg=dark?C.text:'#fff';
  const fg=dark?'#fff':C.text;
  return<div style={{display:'inline-flex',alignItems:'center',gap:9}}>
    <div style={{width:size,height:size,background:bg,borderRadius:Math.round(size*0.235),
      display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,
      transition:'transform 500ms var(--e-spring)',cursor:'default'}}
      onMouseEnter={e=>{e.currentTarget.style.transform='rotate(-4deg)';}}
      onMouseLeave={e=>{e.currentTarget.style.transform='none';}}>
      <span style={{fontFamily:F.serif,fontSize:Math.round(size*0.62),fontWeight:600,fontStyle:'italic',
        color:fg,letterSpacing:'0.02em',lineHeight:1,display:'block',transform:'translateY(-1px)'}}>vv</span>
    </div>
    {showWordmark&&<span style={{fontFamily:F.serif,fontSize:size*0.78,fontWeight:400,fontStyle:'italic',color:dark?C.text:'#fff',letterSpacing:'-0.01em',lineHeight:1}}>vitrine</span>}
  </div>;
}

// Loja brand mark — if the shop has uploaded a logoUrl, show it; otherwise show monogram initials.
function LojaMark({loja,size=34,radius=10,style={}}){
  const initials=(loja?.nome||'').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'·';
  if(loja?.logoUrl){
    return<img src={loja.logoUrl} alt={loja.nome} style={{width:size,height:size,borderRadius:radius,objectFit:'cover',display:'block',flexShrink:0,background:C.surface2,...style}}/>;
  }
  return<div style={{width:size,height:size,borderRadius:radius,background:C.text,color:C.surface,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:F.serif,fontSize:size*0.42,fontWeight:500,letterSpacing:'-0.01em',flexShrink:0,...style}}>{initials}</div>;
}

// Helpers de canvas: round rect + desenho do monograma VV
function _vvRoundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function _drawVVMonogram(ctx,x,y,size){
  // Black rounded square + "vv" italic serif white — matches VVLogo identity
  const r=Math.round(size*0.235);
  ctx.fillStyle='#0e0c0a';
  _vvRoundRect(ctx,x,y,size,size,r);
  ctx.fill();
  ctx.fillStyle='#ffffff';
  ctx.font=`italic 600 ${Math.round(size*0.62)}px "Bodoni Moda", "Didot", "Bodoni 72", Georgia, serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('vv',x+size/2,y+size/2+1);
  ctx.textAlign='start';
}
// Compõe a simulação final em 1080×1920 (Instagram 9:16) e baixa como JPEG
// com marca d'água minimalista (monograma VV + wordmark) no rodapé.
function downloadSimulacaoComMarca(peca){
  const W=1080,H=1920;
  const c=document.createElement('canvas');
  c.width=W;c.height=H;
  const ctx=c.getContext('2d');

  // Fundo branco (preview da simulação — no app real, aqui entraria a imagem gerada)
  ctx.fillStyle='#ffffff';
  ctx.fillRect(0,0,W,H);

  // Padrão diagonal sutil = mesmo placeholder da UI
  ctx.save();
  ctx.fillStyle='#ede8e0';
  ctx.fillRect(0,0,W,H);
  ctx.translate(W/2,H/2);
  ctx.rotate(Math.PI/4);
  const stripe=44,reach=Math.max(W,H)*1.6;
  ctx.fillStyle='#e4ddd5';
  for(let xi=-reach;xi<reach;xi+=stripe*2){
    ctx.fillRect(xi,-reach,stripe,reach*2);
  }
  ctx.restore();

  // Etiqueta canônica (top-left, discreta)
  ctx.fillStyle='rgba(255,255,255,0.7)';
  _vvRoundRect(ctx,28,28,210,38,8);
  ctx.fill();
  ctx.fillStyle='#9a9189';
  ctx.font='600 18px ui-monospace, SFMono-Regular, Menlo, monospace';
  ctx.textBaseline='middle';
  ctx.fillText('9:16 · 1080×1920',46,48);

  // Nome da peça (canto inferior esquerdo, sobre o gradiente)
  // Gradiente sutil para legibilidade da marca
  const grad=ctx.createLinearGradient(0,H-280,0,H);
  grad.addColorStop(0,'rgba(14,12,10,0)');
  grad.addColorStop(1,'rgba(14,12,10,0.55)');
  ctx.fillStyle=grad;
  ctx.fillRect(0,H-280,W,280);

  // Marca d'água minimalista — centralizada no rodapé
  const monoSize=58;
  const gap=14;
  ctx.font='italic 500 44px "Bodoni Moda", "Didot", Georgia, serif';
  const wordW=ctx.measureText('vitrine').width;
  const totalW=monoSize+gap+wordW;
  const baseX=Math.round((W-totalW)/2);
  const baseY=H-monoSize-58;
  _drawVVMonogram(ctx,baseX,baseY,monoSize);
  ctx.fillStyle='rgba(255,255,255,0.96)';
  ctx.textBaseline='middle';
  ctx.fillText('vitrine',baseX+monoSize+gap,baseY+monoSize/2+2);

  // Nome da peça acima da marca (opcional, bem discreto)
  if(peca?.nome){
    ctx.fillStyle='rgba(255,255,255,0.78)';
    ctx.font='400 26px Manrope, system-ui, sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(peca.nome,W/2,baseY-30);
    ctx.textAlign='start';
  }

  // Download
  c.toBlob(blob=>{
    if(!blob)return;
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`vitrine-${(peca?.nome||'simulacao').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')}.jpg`;
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  },'image/jpeg',0.92);
}

function Btn({children,variant='primary',size='md',onClick,disabled,style={},icon,loading=false}){
  const[hov,setHov]=React.useState(false);

<!-- ②a Motion module — tokens-aware hooks + components -->
<script type="text/babel">
// useReveal — adds .vv-reveal once element scrolls into view
function useReveal(opts={}){
  const ref=React.useRef(null);
  const[shown,setShown]=React.useState(false);
  React.useEffect(()=>{
    if(!ref.current||shown)return;
    const io=new IntersectionObserver(([e])=>{
      if(e.isIntersecting){setShown(true);io.disconnect();}
    },{threshold:opts.threshold??0.12,rootMargin:opts.rootMargin||'0px 0px -40px 0px'});
    io.observe(ref.current);
    return()=>io.disconnect();
  },[shown]);
  return[ref,shown];
}

// Stagger — wraps children, applies --i index, plays vv-reveal-up cascading
function Stagger({children,delay=0,step,startWhenVisible=false,as:As='div',style={},className=''}){
  const[ref,shown]=useReveal();
  const stepStr=step?{'--stagger':typeof step==='number'?`${step}ms`:step}:{};
  const visible=startWhenVisible?shown:true;
  return<As ref={startWhenVisible?ref:null} className={visible?`vv-stagger ${className}`:className}
    style={{...stepStr,'--motion-delay':`${delay}ms`,...style}}>
    {React.Children.map(children,(c,i)=>c&&React.cloneElement(c,{
      style:{...(c.props.style||{}),'--i':i+(delay?delay/55:0)}
    }))}
  </As>;
}

// Reveal — single element fades+rises in once visible
function Reveal({children,delay=0,as:As='div',variant='up',style={},className=''}){
  const[ref,shown]=useReveal();
  const cls=variant==='blur'?'vv-blur-in':'vv-reveal';
  return<As ref={ref} className={shown?`${cls} ${className}`:className}
    style={{opacity:shown?undefined:0,animationDelay:`${delay}ms`,...style}}>
    {children}
  </As>;
}

// CountUp — animates a number from 0 to value
function CountUp({value=0,duration=900,format=v=>Math.round(v),style={}}){
  const[v,setV]=React.useState(0);
  const[ref,shown]=useReveal({threshold:0.4});
  React.useEffect(()=>{
    if(!shown)return;
    let raf,start;const from=0,to=value,d=duration;
    const tick=t=>{if(!start)start=t;const p=Math.min(1,(t-start)/d);
      // easeOutCubic
      const e=1-Math.pow(1-p,3);
      setV(from+(to-from)*e);
      if(p<1)raf=requestAnimationFrame(tick);};
    raf=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(raf);
  },[shown,value,duration]);
  return<span ref={ref} style={style}>{format(v)}</span>;
}

// AnimatedCheck — SVG checkmark that draws on mount
function AnimatedCheck({size=18,color='#fff',duration=380}){
  return<svg width={size} height={size} viewBox="0 0 24 24" fill="none">
    <polyline points="20 6 9 17 4 12" stroke={color} strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"
      style={{strokeDasharray:60,animation:`vv-draw ${duration}ms var(--e-out) forwards`}}/>
  </svg>;
}

// Toast — bottom-center transient notification with motion-in/out
function Toast({open,children,variant='neutral',onClose,duration=2400}){
  React.useEffect(()=>{
    if(!open||!duration)return;
    const t=setTimeout(()=>onClose&&onClose(),duration);
    return()=>clearTimeout(t);
  },[open,duration]);
  if(!open)return null;
  const bg=variant==='success'?C.text:variant==='danger'?C.danger:C.text;
  return<div style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',zIndex:3000,
    background:bg,color:'#fff',padding:'10px 18px',borderRadius:24,fontFamily:F.sans,fontSize:13,fontWeight:500,
    boxShadow:'0 12px 40px rgba(0,0,0,0.22)',animation:'vv-toast 0.32s var(--e-spring) both',
    display:'flex',alignItems:'center',gap:8}}>
    {variant==='success'&&<AnimatedCheck size={14} color="#fff"/>}
    {children}
  </div>;
}

// Hover-lift — wrap a child to add a managed hover transform without conflicts
function HoverLift({children,scale=1.02,lift=2,style={}}){
  const[h,setH]=React.useState(false);
  return<div onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
    style={{transition:'transform var(--t-base) var(--e-out)',transform:h?`translateY(-${lift}px) scale(${scale})`:'none',...style}}>
    {children}
  </div>;
}

// Page transition wrapper — fades content when key changes
function PageTransition({k,children,style={}}){
  return<div key={k} className="vv-tab-pane" style={style}>{children}</div>;
}
</script>

<!-- ② Upload component (shared, reusable) -->
<script type="text/babel">
// Reusable upload zone — minimal empty state, full-bleed preview after upload
function UploadZone({title,desc,value,onChange,onRemove,compact=false,accept='image/*',shape='rect',hint='JPEG, PNG ou WebP · até 5 MB'}){
  const[drag,setDrag]=React.useState(false);
  const[loading,setLoading]=React.useState(false);
  const[error,setError]=React.useState(null);
  const fileRef=React.useRef(null);

  function simulateUpload(file){
    setLoading(true);setError(null);
    setTimeout(()=>{
      setLoading(false);
      onChange({name:file.name,url:URL.createObjectURL(file),size:file.size});
    },900);
  }

  function handleFile(file){
    if(!file)return;
    if(!file.type.startsWith('image/')){setError('Formato inválido. Use JPEG, PNG ou WebP.');return;}
    if(file.size>5*1024*1024){setError('Arquivo muito grande. Máx 5 MB.');return;}
    simulateUpload(file);
  }

  function handleDrop(e){
    e.preventDefault();setDrag(false);
    const file=e.dataTransfer.files[0];
    handleFile(file);
  }

  const isCircle=shape==='circle';
  // Empty: minimal/compact (sem aspect alto). Preview: 9:16 (1080×1920) contido.
  const baseW=compact&&isCircle?92:'100%';
  const baseH=compact&&isCircle?92:undefined;
  const aspectPreview=isCircle?undefined:'9 / 16';
  const aspectEmpty=isCircle?undefined:(compact?'4 / 3':undefined);

  // ── Preview state ──
  if(value){
    return<div style={{display:'flex',flexDirection:'column',gap:10,alignItems:'stretch',width:'100%',animation:'vv-fade 0.32s var(--e-out)'}}>
      <div style={{position:'relative',borderRadius:isCircle?'50%':14,overflow:'hidden',
        width:baseW,height:baseH,aspectRatio:aspectPreview,
        maxWidth:isCircle?undefined:300,maxHeight:isCircle?undefined:'52vh',
        alignSelf:'center',
        background:`linear-gradient(180deg, ${C.surface2} 0%, ${C.surface3} 100%)`}}>
        {/* object-fit:contain garante imagem inteira visível sem cortes — independente da proporção */}
        <img src={value.url} alt={value.name} style={{width:'100%',height:'100%',objectFit:isCircle?'cover':'contain',display:'block'}}/>
        {/* Badge canônico 9:16 (top-left, discreto) */}
        {!isCircle&&<span aria-hidden="true" style={{position:'absolute',top:8,left:8,padding:'3px 7px',borderRadius:5,background:'rgba(255,255,255,0.7)',color:'#9a9189',fontFamily:F.mono,fontSize:9,letterSpacing:'0.04em',pointerEvents:'none'}}>9:16 · 1080×1920</span>}
        {/* Hover overlay com ações */}
        <div className="upload-actions-wrap" style={{position:'absolute',inset:0,display:'flex',alignItems:'flex-end',justifyContent:'center',padding:14,background:'linear-gradient(to top, rgba(20,16,14,0.45) 0%, rgba(20,16,14,0) 35%)',opacity:0,transition:'opacity 0.2s'}}
          onMouseEnter={e=>{e.currentTarget.style.opacity='1'}}
          onMouseLeave={e=>{e.currentTarget.style.opacity='0'}}>
          <div style={{display:'flex',gap:6}}>
            <button onClick={()=>fileRef.current?.click()} style={{background:'rgba(255,255,255,0.95)',border:'none',borderRadius:99,padding:'7px 14px',fontFamily:F.sans,fontSize:11.5,fontWeight:500,cursor:'pointer',display:'flex',alignItems:'center',gap:5,color:C.text,letterSpacing:'-0.005em'}}>
              <IconRefresh size={11} color={C.text}/>Trocar
            </button>
            <button onClick={onRemove} style={{background:'rgba(255,255,255,0.95)',border:'none',borderRadius:99,padding:'7px 10px',fontFamily:F.sans,fontSize:11.5,fontWeight:500,cursor:'pointer',display:'flex',alignItems:'center',gap:5,color:C.danger}}>
              <IconTrash size={11} color={C.danger}/>
            </button>
          </div>
        </div>
      </div>
      {/* Discreto file chip — mostrado abaixo, fora da imagem, para não interferir no preview */}
      {!compact&&<div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,padding:'0 2px'}}>
        <span style={{fontFamily:F.sans,fontSize:11.5,color:C.text3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>{value.name}</span>
        <button onClick={()=>fileRef.current?.click()} style={{background:'none',border:'none',cursor:'pointer',color:C.text2,fontFamily:F.sans,fontSize:11.5,padding:0,letterSpacing:'-0.005em'}}>Trocar imagem</button>
      </div>}
      <input ref={fileRef} type="file" accept={accept} style={{display:'none'}} onChange={e=>handleFile(e.target.files[0])}/>
    </div>;
  }

  // ── Empty state — minimalista (sem ocupar uma área 3:4 enorme antes do upload) ──
  const borderColor=error?C.danger:drag?C.text:'rgba(30,26,23,0.10)';
  return<div style={{width:'100%'}}>
    <div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={handleDrop}
      onClick={()=>!loading&&fileRef.current?.click()}
      style={{border:`1px ${drag?'solid':'dashed'} ${borderColor}`,borderRadius:isCircle?'50%':12,
        width:baseW,height:baseH,aspectRatio:aspectEmpty,
        minHeight:isCircle?undefined:(compact?undefined:128),
        display:'flex',flexDirection:isCircle||compact?'column':'row',alignItems:'center',justifyContent:'center',
        gap:isCircle||compact?12:14,padding:isCircle||compact?'0':'18px 22px',position:'relative',
        cursor:loading?'wait':'pointer',transition:'all 0.18s var(--e-out)',
        background:drag?'rgba(184,149,106,0.06)':error?C.dangerLight:'transparent'}}
      onMouseEnter={e=>{if(!drag&&!error)e.currentTarget.style.borderColor='rgba(30,26,23,0.22)'}}
      onMouseLeave={e=>{if(!drag&&!error)e.currentTarget.style.borderColor=borderColor}}>
      {loading?<>
          <Spinner size={20} color={C.text2}/>
          <span style={{fontFamily:F.sans,fontSize:12,color:C.text3,letterSpacing:'-0.005em'}}>Enviando</span>
        </>

                <button onClick={()=>setDrawerPeca(focusPeca)}

                </button>
                {/* Progress indicator */}
                <div style={{marginTop:'auto',fontFamily:F.sans,fontSize:11,color:C.text3,textAlign:'center'}}>
                  {focusIdx+1} de {filtered.length}
                </div>
              </div>
            </div>}
          </React.Fragment>)}
          {viewMode==='grade'&&<StoreBanner loja={LOJA}/>}
        </div>
      </DesktopFrame>
    </div>

    {/* Feature 2: Piece drawer */}
    <PecaDrawer open={!!drawerPeca} onClose={()=>setDrawerPeca(null)} peca={drawerPeca}
      showPrice={showPrice}
      onCabine={(p)=>{setCabinePeca(p);}}/>

    <CabineModal open={!!cabinePeca} onClose={()=>setCabinePeca(null)} peca={cabinePeca} lojaConfig={lojaConfig}/>
  </div>;
}
</script>

const TAMANHOS_PADRAO=['PP','P','M','G','GG','36','38','40','42','44','Único'];

function PecaFormModal({open,onClose,peca,onSave}){
  const[nome,setNome]=React.useState('');
  const[preco,setPreco]=React.useState('');
  const[tamanhosSel,setTamanhosSel]=React.useState([]);
  const[cat,setCat]=React.useState('blusas');
  const[catCustom,setCatCustom]=React.useState('');
  const[fotos,setFotos]=React.useState([]); // [{url,name,destaque}]
  const[saving,setSaving]=React.useState(false);
  const fileRef=React.useRef(null);

  React.useEffect(()=>{
    if(open){
      setNome(peca?.nome||'');
      setPreco(peca?(peca.preco/100).toFixed(2):'');
      // Parse tamanhos from string
      const ts=peca?.tamanho?peca.tamanho.split(/[,·\s]+/).map(t=>t.trim()).filter(Boolean):[];
      setTamanhosSel(ts);
      setCat(peca?.cat||'blusas');setCatCustom('');setFotos([]);
    }
  },[open,peca]);

  function toggleTamanho(t){
    setTamanhosSel(prev=>prev.includes(t)?prev.filter(x=>x!==t):[...prev,t]);
  }

  function handleFotos(files){
    const arr=Array.from(files).slice(0,8-fotos.length);
    const novos=arr.map((f,i)=>({url:URL.createObjectURL(f),name:f.name,destaque:fotos.length===0&&i===0}));
    setFotos(prev=>[...prev,...novos].map((f,i)=>({...f,destaque:i===0?prev.length===0:f.destaque})));
  }

  function setDestaque(idx){
    setFotos(prev=>prev.map((f,i)=>({...f,destaque:i===idx})));
  }

  function removeFoto(idx){
    setFotos(prev=>{
      const next=prev.filter((_,i)=>i!==idx);
      if(next.length>0&&!next.some(f=>f.destaque)) next[0].destaque=true;
      return next;
    });
  }

  function handleSave(){
    setSaving(true);
    const tamanhoStr=tamanhosSel.join(' · ')||'';
    const finalCat=cat==='custom'?catCustom.toLowerCase().replace(/\s+/g,'-')||'outros':cat;
    setTimeout(()=>{
      onSave({nome,preco:preco?Math.round(parseFloat(preco)*100):0,tamanho:tamanhoStr,cat:finalCat,status:'disponivel',fotos:fotos.length});
      setSaving(false);
    },700);
  }

  const isCustomCat=cat==='custom';

  return<VVModal open={open} onClose={onClose} title={peca?'Editar peça':'Nova peça'} width={520}
    footer={<>
      <Btn variant="ghost" onClick={onClose}>Cancelar</Btn>
      <Btn variant="dark" onClick={handleSave} disabled={!nome} loading={saving}>{saving?'Salvando…':'Salvar'}</Btn>
    </>}>
    <div style={{display:'flex',flexDirection:'column',gap:18}}>

      {/* Nome — único obrigatório */}
      <VVInput label="Nome" value={nome} onChange={e=>setNome(e.target.value)}
        placeholder="Ex: Blusa de linho branca" required/>

      {/* Preço — opcional */}
      <VVInput label={<span>Preço <span style={{fontFamily:F.sans,fontSize:11,color:C.text3,fontWeight:400}}>opcional</span></span>}
        value={preco} onChange={e=>setPreco(e.target.value)} prefix="R$" type="number"/>

      {/* Tamanhos — chips múltiplos, opcional */}
      <div>
        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:10}}>
          <label style={{fontFamily:F.sans,fontSize:12.5,fontWeight:500,color:C.text2}}>Tamanhos</label>
          <span style={{fontFamily:F.sans,fontSize:11,color:C.text3}}>opcional</span>
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {TAMANHOS_PADRAO.map(t=>{
            const on=tamanhosSel.includes(t);
            return<button key={t} onClick={()=>toggleTamanho(t)}
              style={{padding:'6px 13px',borderRadius:20,border:`1.5px solid ${on?C.accent:C.border}`,
                background:on?C.accentLight:'transparent',color:on?C.accentDark:C.text2,
                fontFamily:F.sans,fontSize:12.5,fontWeight:on?600:400,cursor:'pointer',transition:'all 0.12s'}}>
              {t}
            </button>;
          })}
        </div>
        {tamanhosSel.length>0&&<div style={{marginTop:8,fontFamily:F.sans,fontSize:11.5,color:C.text3}}>
          Selecionados: {tamanhosSel.join(', ')}
        </div>}
      </div>

      {/* Categoria */}
      <div>
        <VVSelect label="Categoria" value={cat} onChange={e=>setCat(e.target.value)}
          options={[...CATEGORIAS.map(c=>({value:c.id,label:c.label})),{value:'custom',label:'+ Adicionar categoria personalizada'}]}/>
        {isCustomCat&&<VVInput value={catCustom} onChange={e=>setCatCustom(e.target.value)}
          placeholder="Nome da categoria…" style={{marginTop:8}}/>}
      </div>

      {/* Fotos */}
      <div>
        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:10}}>
          <label style={{fontFamily:F.sans,fontSize:12.5,fontWeight:500,color:C.text2}}>Fotos</label>
          <span style={{fontFamily:F.sans,fontSize:11,color:C.text3}}>até 8</span>
        </div>
        {/* Uploaded thumbnails */}
        {fotos.length>0&&<div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:10}}>
          {fotos.map((f,i)=><div key={i} style={{position:'relative',width:72,height:72,borderRadius:9,overflow:'hidden',
            border:`2px solid ${f.destaque?C.accent:C.border}`,cursor:'pointer',flexShrink:0}}
            onClick={()=>setDestaque(i)}>
            <img src={f.url} alt="" style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
            {/* Destaque badge */}
            {f.destaque&&<div style={{position:'absolute',bottom:0,left:0,right:0,background:C.accent,padding:'2px 0',textAlign:'center',fontFamily:F.sans,fontSize:9,color:'#fff',fontWeight:600}}>destaque</div>}
            {/* Remove */}
            <button onClick={e=>{e.stopPropagation();removeFoto(i);}}
              style={{position:'absolute',top:3,right:3,width:18,height:18,borderRadius:'50%',background:'rgba(30,26,23,0.7)',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <IconX size={9} color="#fff"/>
            </button>
          </div>)}
          {/* Add more */}
          {fotos.length<8&&<div onClick={()=>fileRef.current?.click()}
            style={{width:72,height:72,borderRadius:9,border:`2px dashed ${C.border}`,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,cursor:'pointer',background:C.surface2,flexShrink:0,transition:'border-color 0.15s'}}
            onMouseEnter={e=>e.currentTarget.style.borderColor=C.accent}
            onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
            <span style={{color:C.text3,fontSize:18,lineHeight:1}}>+</span>
          </div>}
        </div>}
        {/* Empty drop zone */}
        {fotos.length===0&&<div onClick={()=>fileRef.current?.click()}
          onDragOver={e=>e.preventDefault()}
          onDrop={e=>{e.preventDefault();handleFotos(e.dataTransfer.files);}}
          style={{border:`2px dashed ${C.border}`,borderRadius:10,padding:'20px',textAlign:'center',background:C.surface2,cursor:'pointer',transition:'border-color 0.15s'}}
          onMouseEnter={e=>e.currentTarget.style.borderColor=C.accent}
          onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
          <div style={{marginBottom:6}}><IconUpload size={20} color={C.text3}/></div>
          <div style={{fontFamily:F.sans,fontSize:13,color:C.text2,marginBottom:2}}>Arraste ou <span style={{color:C.accent}}>selecione fotos</span></div>
          <div style={{fontFamily:F.sans,fontSize:11,color:C.text3}}>JPEG · PNG · até 5 MB cada</div>
        </div>}
        {fotos.length>0&&<div style={{fontFamily:F.sans,fontSize:11.5,color:C.text3}}>Clique numa foto para definir como destaque</div>}
        <input ref={fileRef} type="file" accept="image/*" multiple style={{display:'none'}} onChange={e=>handleFotos(e.target.files)}/>
      </div>

      <div style={{display:'flex',alignItems:'center',gap:7,padding:'9px 12px',background:C.accentLight,borderRadius:8}}>
        <span style={{color:C.accent,fontSize:13}}>◈</span>
        <span style={{fontFamily:F.sans,fontSize:11.5,color:C.accentDark}}>Publicada automaticamente como <strong>disponível</strong>.</span>
      </div>
    </div>
  </VVModal>;
}

function VendidoModal({open,onClose,peca,onConfirm}){
  const[sel,setSel]=React.useState([]);
  const tamanhos=peca?.tamanho?peca.tamanho.split(/[,·\s]+/).map(t=>t.trim()).filter(Boolean):[];
  const semTamanho=tamanhos.length===0;

  React.useEffect(()=>{if(open)setSel([]);},[open,peca]);

  function confirm(todos=false){
    onConfirm(todos?'todos':sel);
    onClose();
  }

  return<VVModal open={open} onClose={onClose} title="Confirma a venda?" width={380}
    footer={<>
      <Btn variant="ghost" onClick={onClose}>Cancelar</Btn>
      <Btn variant="dark" disabled={!semTamanho&&sel.length===0} onClick={()=>confirm(false)}>
        {semTamanho?'Sim, confirmar':sel.length===tamanhos.length?'Marcar todos':'Confirmar venda'}
      </Btn>
    </>}>
    {semTamanho
      ?<p style={{fontFamily:F.sans,fontSize:13.5,color:C.text2,margin:0,lineHeight:1.65}}>
          A peça <strong>{peca?.nome}</strong> será marcada como vendida e sairá da vitrine. Você poderá reverter depois.
        </p>
      :<div>
        <p style={{fontFamily:F.sans,fontSize:13.5,color:C.text2,margin:'0 0 16px',lineHeight:1.6}}>Qual tamanho foi vendido?</p>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>
          {tamanhos.map(t=>{const on=sel.includes(t);return<button key={t} onClick={()=>setSel(prev=>on?prev.filter(x=>x!==t):[...prev,t])}
            style={{padding:'8px 16px',borderRadius:20,border:`1.5px solid ${on?C.accent:C.border}`,
              background:on?C.accentLight:'transparent',color:on?C.accentDark:C.text2,
              fontFamily:F.sans,fontSize:13,fontWeight:on?600:400,cursor:'pointer',transition:'all 0.12s'}}>
            {t}
          </button>;})}
        </div>
        <button onClick={()=>confirm(true)} style={{width:'100%',padding:'9px',border:`1px dashed ${C.border}`,borderRadius:8,background:'transparent',color:C.text2,fontFamily:F.sans,fontSize:13,cursor:'pointer',transition:'all 0.15s'}}
          onMouseEnter={e=>e.currentTarget.style.borderColor=C.danger}
          onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
          Marcar todos os tamanhos como vendido
        </button>
      </div>}
  </VVModal>;
}

function PecasList({pecas,setPecas,showAll}){
  const[modalOpen,setModalOpen]=React.useState(false);
  const[editPeca,setEditPeca]=React.useState(null);
  const[deleteId,setDeleteId]=React.useState(null);
  const[detalhePeca,setDetalhePeca]=React.useState(null);
  const[vendidoPeca,setVendidoPeca]=React.useState(null);
  const[search,setSearch]=React.useState('');
  const[catF,setCatF]=React.useState('todas');
  const[view,setView]=React.useState('grid');

  const filtered=pecas.filter(p=>{
    const q=search.toLowerCase();
    const matchS=p.nome.toLowerCase().includes(q)||getCatLabel(p.cat).toLowerCase().includes(q);
    const matchSt=showAll||p.status==='disponivel';
    const matchC=catF==='todas'||p.cat===catF;
    return matchS&&matchSt&&matchC;
  }).sort((a,b)=>(a.createdAt||'').localeCompare(b.createdAt||''));

  function handleSave(data){
    if(editPeca) setPecas(prev=>prev.map(p=>p.id===editPeca.id?{...p,...data}:p));
    else setPecas(prev=>[...prev,{id:String(Date.now()),...data,fotos:0}]);
    setModalOpen(false);setEditPeca(null);
  }

  function handleVendido(peca){
    // Sempre abre o modal para confirmar a venda
    setVendidoPeca(peca);
  }

  function handleRestaurar(peca){
    setPecas(prev=>prev.map(x=>x.id===peca.id?{...x,status:'disponivel'}:x));
  }

  function handleVendidoConfirm(tamanhosSel){
    if(!vendidoPeca)return;
    if(tamanhosSel==='todos'){
      setPecas(prev=>prev.map(x=>x.id===vendidoPeca.id?{...x,status:'vendida'}:x));
    } else {
      // Remove sold sizes from available
      const tamanhos=vendidoPeca.tamanho.split(/[,·\s]+/).map(t=>t.trim()).filter(Boolean);
      const restantes=tamanhos.filter(t=>!tamanhosSel.includes(t));
      if(restantes.length===0){
        setPecas(prev=>prev.map(x=>x.id===vendidoPeca.id?{...x,status:'vendida'}:x));
      } else {
        setPecas(prev=>prev.map(x=>x.id===vendidoPeca.id?{...x,tamanho:restantes.join(' · ')}:x));
      }
    }
    setVendidoPeca(null);
  }

  return<div style={{padding:'26px 32px',overflowY:'auto',height:'100%',boxSizing:'border-box'}}>
    <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:20,gap:12,flexWrap:'wrap'}}>
      <div>
        <h1 style={{fontFamily:F.serif,fontSize:24,fontWeight:600,color:C.text,margin:0,letterSpacing:'0.01em'}}>{showAll?'Todas as peças':'Peças disponíveis'}</h1>
        <p style={{fontFamily:F.sans,fontSize:13,color:C.text3,margin:'3px 0 0'}}>{filtered.length} peças</p>
      </div>
      <Btn variant="dark" icon={<span style={{fontSize:15}}>+</span>} onClick={()=>{setEditPeca(null);setModalOpen(true);}}>Nova peça</Btn>
    </div>
    <div style={{display:'flex',gap:10,marginBottom:16,alignItems:'center',flexWrap:'wrap'}}>
      <div style={{position:'relative',flex:1,maxWidth:320}}>
        <span style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:C.text3,fontSize:13}}>🔍</span>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar por nome ou categoria"
          style={{width:'100%',padding:'8px 12px 8px 32px',border:`1.5px solid ${C.border}`,borderRadius:8,fontFamily:F.sans,fontSize:13.5,color:C.text,background:C.surface,outline:'none',boxSizing:'border-box'}}/>
      </div>
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        {[{id:'todas',label:'Todas'},...CATEGORIAS].map(c=>{const on=catF===c.id;return<button key={c.id} onClick={()=>setCatF(c.id)}
          style={{padding:'6px 12px',borderRadius:16,border:`1px solid ${on?C.text:C.border}`,background:on?C.text:'transparent',color:on?'#fff':C.text2,fontFamily:F.sans,fontSize:12,fontWeight:500,cursor:'pointer',whiteSpace:'nowrap',transition:'all 0.15s'}}>{c.label}</button>;})}
      </div>
      <div style={{display:'flex',border:`1px solid ${C.border}`,borderRadius:8,overflow:'hidden',flexShrink:0}}>
        {['grid','list'].map(v=><button key={v} onClick={()=>setView(v)} style={{padding:'7px 12px',background:view===v?C.text:C.surface,color:view===v?'#fff':C.text2,border:'none',cursor:'pointer',fontFamily:F.sans,fontSize:13}}>{v==='grid'?'⊞':'≡'}</button>)}
      </div>
    </div>
    {view==='grid'
      ?<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:14}}>
        {filtered.map((p,i)=><VVCard key={p.id} hover style={{overflow:'hidden'}}>
          <div onClick={()=>setDetalhePeca(p)} style={{cursor:'pointer'}}><ImgPlaceholder height={180} label={PHLABELS[i%PHLABELS.length]}/></div>
          <div style={{padding:'12px 14px'}}>
            <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:5,marginBottom:3}}>
              <span style={{fontFamily:F.sans,fontSize:13,fontWeight:500,color:C.text,lineHeight:1.35,overflow:'hidden',textOverflow:'ellipsis',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{p.nome}</span>
              <Badge label={p.status==='disponivel'?'disponível':'vendida'} variant={p.status==='disponivel'?'disponivel':'vendida'}/>
            </div>
            <div style={{fontFamily:F.sans,fontSize:11.5,color:C.text3,marginBottom:8}}>{p.tamanho||'—'}</div>
            <div style={{fontFamily:F.serif,fontSize:17,fontWeight:600,color:C.text,marginBottom:10}}>{p.preco?formatPrice(p.preco):'—'}</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              <Btn variant="ghost" size="sm" onClick={()=>{setEditPeca(p);setModalOpen(true);}}>Editar</Btn>
              {p.status==='disponivel'
                ?<button onClick={()=>handleVendido(p)} title="Marcar como vendida" style={{width:30,height:30,padding:0,display:'inline-flex',alignItems:'center',justifyContent:'center',borderRadius:7,border:`1px solid ${C.border}`,background:C.surface,color:C.text2,cursor:'pointer',transition:'all 0.15s'}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=C.accent;e.currentTarget.style.color=C.accent}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.text2}}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
                </button>
                :<Btn variant="text" size="sm" onClick={()=>handleRestaurar(p)} style={{color:C.accent,fontSize:12}}>↩ Restaurar</Btn>}
            </div>
          </div>
        </VVCard>)}
      </div>
      :<VVCard>
        {filtered.map((p,i)=><React.Fragment key={p.id}>
          <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 18px'}}>
            <div onClick={()=>setDetalhePeca(p)} style={{cursor:'pointer',flexShrink:0}}><ImgPlaceholder width={48} height={48} style={{borderRadius:7}}/></div>
            <div style={{flex:1,minWidth:0}}>
              <div onClick={()=>setDetalhePeca(p)} style={{fontFamily:F.sans,fontSize:13.5,fontWeight:500,color:C.text,cursor:'pointer',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.nome}</div>
              <div style={{fontFamily:F.sans,fontSize:11.5,color:C.text3,marginTop:1}}>{getCatLabel(p.cat)}{p.tamanho?` · ${p.tamanho}`:''}</div>
            </div>
            <span style={{fontFamily:F.serif,fontSize:16,fontWeight:600,color:C.text,flexShrink:0}}>{p.preco?formatPrice(p.preco):'—'}</span>
            <Badge label={p.status==='disponivel'?'disponível':'vendida'} variant={p.status==='disponivel'?'disponivel':'vendida'}/>
            <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
              <Btn variant="ghost" size="sm" onClick={()=>{setEditPeca(p);setModalOpen(true);}}>Editar</Btn>
              {p.status==='disponivel'
                ?<button onClick={()=>handleVendido(p)} title="Marcar como vendida" style={{width:30,height:30,padding:0,display:'inline-flex',alignItems:'center',justifyContent:'center',borderRadius:7,border:`1px solid ${C.border}`,background:C.surface,color:C.text2,cursor:'pointer',transition:'all 0.15s'}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=C.accent;e.currentTarget.style.color=C.accent}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.text2}}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
                </button>
                :<Btn variant="text" size="sm" onClick={()=>handleRestaurar(p)} style={{color:C.accent,fontSize:12}}>↩ Restaurar</Btn>}
            </div>
          </div>
          {i<filtered.length-1&&<Divider/>}
        </React.Fragment>)}
      </VVCard>}
    <PecaFormModal open={modalOpen} onClose={()=>{setModalOpen(false);setEditPeca(null);}} peca={editPeca} onSave={handleSave}/>
    <VVModal open={!!deleteId} onClose={()=>setDeleteId(null)} title="Excluir peça" width={400}
      footer={<><Btn variant="ghost" onClick={()=>setDeleteId(null)}>Cancelar</Btn><Btn variant="danger" onClick={()=>{setPecas(prev=>prev.filter(p=>p.id!==deleteId));setDeleteId(null);}}>Excluir</Btn></>}>
      <p style={{fontFamily:F.sans,fontSize:14,color:C.text2,margin:0,lineHeight:1.6}}>Esta ação é irreversível. A peça será removida da vitrine.</p>
    </VVModal>
    <VendidoModal open={!!vendidoPeca} onClose={()=>setVendidoPeca(null)} peca={vendidoPeca} onConfirm={handleVendidoConfirm}/>
    <PecaDetalhe open={!!detalhePeca} onClose={()=>setDetalhePeca(null)} peca={detalhePeca}
      onEdit={()=>{setEditPeca(detalhePeca);setDetalhePeca(null);setModalOpen(true);}}
      onDelete={()=>{setDeleteId(detalhePeca?.id);setDetalhePeca(null);}}/>
  </div>;
}

// Feature 1 — Provador: compact visual picker (minimalista)
function ProvadorConfigCompact({config,onChange}){
  const[uploading,setUploading]=React.useState(false);
  const fileRef=React.useRef(null);

  function handleFile(file){
    if(!file||!file.type.startsWith('image/'))return;
    setUploading(true);
    setTimeout(()=>{
      const url=URL.createObjectURL(file);
      setUploading(false);
      onChange({...config,fundoTipo:'personalizado',fundoImg:{name:file.name,url}});
    },900);
  }

  function handleRemove(e){
    e.stopPropagation();
    onChange({...config,fundoTipo:'branco',fundoImg:null});
  }

  const isBranco=config.fundoTipo==='branco';
  const hasImg=config.fundoImg?.url;

  // Tile dimensions
  const tw=112,th=88;

  return<div>
    <div style={{fontFamily:F.sans,fontSize:11,fontWeight:600,color:C.text3,textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:12}}>Fundo do provador</div>
    <div style={{display:'flex',gap:10}}>

      {/* Tile 1 — Fundo branco */}
      <div onClick={()=>onChange({...config,fundoTipo:'branco'})}
        style={{width:tw,cursor:'pointer',flexShrink:0,transition:'all 0.15s'}}>
        <div style={{width:tw,height:th,borderRadius:10,border:`2px solid ${isBranco?C.accent:C.border}`,overflow:'hidden',
          background:'#fff',display:'flex',alignItems:'center',justifyContent:'center',transition:'border-color 0.15s',position:'relative'}}>
          {/* Minimal provador illustration */}
          <svg width="52" height="64" viewBox="0 0 52 64" fill="none">
            {/* Body silhouette — clean and abstract */}
            <ellipse cx="26" cy="14" rx="9" ry="9" fill="#e8e2db"/>
            <path d="M10 64 C10 44 16 36 26 34 C36 36 42 44 42 64Z" fill="#ede8e0"/>
          </svg>
          {isBranco&&<div style={{position:'absolute',top:6,right:6,width:16,height:16,borderRadius:'50%',background:C.accent,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <IconCheck size={9} color="#fff"/>
          </div>}
        </div>
        <div style={{marginTop:8,textAlign:'center'}}>
          <div style={{fontFamily:F.sans,fontSize:12,fontWeight:isBranco?600:400,color:isBranco?C.text:C.text2}}>Padrão branco</div>
        </div>
      </div>

      {/* Tile 2 — Experiência da loja */}
      <div onClick={()=>{if(!hasImg)fileRef.current?.click();else onChange({...config,fundoTipo:'personalizado'});}}
        style={{width:tw,cursor:'pointer',flexShrink:0,transition:'all 0.15s'}}>
        <div style={{width:tw,height:th,borderRadius:10,border:`2px solid ${!isBranco?C.accent:C.border}`,overflow:'hidden',
          background:C.surface2,display:'flex',alignItems:'center',justifyContent:'center',transition:'border-color 0.15s',position:'relative'}}>
          {uploading&&<Spinner size={20} color={C.accent}/>}
          {!uploading&&hasImg&&<>
            <img src={config.fundoImg.url} alt="" style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
            {!isBranco&&<div style={{position:'absolute',top:6,right:6,width:16,height:16,borderRadius:'50%',background:C.accent,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <IconCheck size={9} color="#fff"/>
            </div>}
          </>}
          {!uploading&&!hasImg&&<div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
            <IconUpload size={18} color={C.text3}/>
            <span style={{fontFamily:F.sans,fontSize:10,color:C.text3}}>Enviar foto</span>
          </div>}
        </div>
        <div style={{marginTop:8,textAlign:'center'}}>
          <div style={{fontFamily:F.sans,fontSize:12,fontWeight:!isBranco?600:400,color:!isBranco?C.text:C.text2}}>Experiência da loja</div>
        </div>
      </div>

      {/* Actions when image is uploaded */}
      {hasImg&&!uploading&&<div style={{display:'flex',flexDirection:'column',justifyContent:'center',gap:6,paddingTop:4}}>
        <button onClick={()=>fileRef.current?.click()} style={{background:'none',border:`1px solid ${C.border}`,borderRadius:7,padding:'5px 11px',fontFamily:F.sans,fontSize:11.5,color:C.text2,cursor:'pointer',display:'flex',alignItems:'center',gap:4,whiteSpace:'nowrap'}}>
          <IconRefresh size={11} color={C.text2}/>Trocar
        </button>
        <button onClick={handleRemove} style={{background:'none',border:'none',borderRadius:7,padding:'5px 11px',fontFamily:F.sans,fontSize:11.5,color:C.text3,cursor:'pointer',display:'flex',alignItems:'center',gap:4,whiteSpace:'nowrap'}}>
          <IconTrash size={11} color={C.text3}/>Remover
        </button>

    <h1 style={{fontFamily:F.serif,fontSize:25,fontWeight:600,color:C.text,margin:'0 0 8px',textAlign:'center'}}>{isInvite?'Defina sua senha':'Nova senha'}</h1>
    <p style={{fontFamily:F.sans,fontSize:13.5,color:C.text2,margin:'0 0 22px',textAlign:'center',lineHeight:1.65}}>{isInvite?'Crie uma senha segura para sua conta.':'Escolha uma nova senha.'}</p>
    <div style={{display:'flex',flexDirection:'column',gap:13}}>
      <VVInput label="Nova senha" value={senha} onChange={e=>setSenha(e.target.value)} type="password" placeholder="••••••••" required/>
      <VVInput label="Confirmar senha" value={confirmar} onChange={e=>setConfirmar(e.target.value)} type="password" placeholder="••••••••"
        error={confirmar.length>2&&!matches?'As senhas não coincidem':undefined}/>
      {senha.length>0&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'5px 10px',padding:'10px 12px',background:C.surface2,borderRadius:8}}>
        {checks.map(c=><div key={c.label} style={{display:'flex',alignItems:'center',gap:5}}>
          <span style={{fontSize:11,color:c.ok?C.success:C.text3,fontWeight:700}}>{c.ok?'✓':'·'}</span>
          <span style={{fontFamily:F.sans,fontSize:11.5,color:c.ok?C.success:C.text3}}>{c.label}</span>
        </div>)}
      </div>}
      <Btn variant="dark" size="lg" onClick={()=>{if(!valid)return;setLoading(true);setTimeout(()=>{setLoading(false);setDoneState(true);},900);}}
        disabled={!valid} loading={loading} style={{width:'100%',justifyContent:'center',marginTop:2}}>
        {!loading&&(isInvite?'Salvar senha e acessar':'Redefinir senha')}
      </Btn>
    </div>
  </AuthShell>;
}

function AuthScreens(){
  const[view,setView]=React.useState('recuperar');
  const views=[{id:'recuperar',label:'Recuperar senha'},{id:'convite',label:'Pós-convite'},{id:'redefinir',label:'Redefinir senha'}];
  return<div style={{display:'flex',flexDirection:'column',height:'100%',background:C.surface3,overflow:'hidden'}}>
    <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:'11px 28px',display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
      <span style={{fontFamily:F.sans,fontSize:12,color:C.text3,marginRight:6}}>Tela:</span>
      {views.map(v=><button key={v.id} onClick={()=>setView(v.id)} style={{padding:'6px 14px',borderRadius:20,border:`1px solid ${view===v.id?C.text:C.border}`,background:view===v.id?C.text:'transparent',color:view===v.id?'#fff':C.text2,fontFamily:F.sans,fontSize:13,fontWeight:500,cursor:'pointer',transition:'all 0.15s'}}>{v.label}</button>)}
    </div>
    <div style={{flex:1,overflowY:'auto'}}>
      {view==='recuperar'&&<RecuperarSenha onBack={()=>{}}/>}
      {view==='convite'&&<DefinirSenha mode="invite"/>}
      {view==='redefinir'&&<DefinirSenha mode="reset"/>}
    </div>
  </div>;
}
</script>

<!-- ⑨ Tweaks -->
<script type="text/babel">
const __TWK_CSS=`.twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:260px;max-height:calc(100vh - 32px);display:flex;flex-direction:column;background:rgba(250,249,247,.9);color:#29261b;-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border:.5px solid rgba(255,255,255,.6);border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.18);font:11.5px/1.4 ui-sans-serif,system-ui,sans-serif;overflow:hidden}.twk-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 8px 10px 14px;cursor:move;user-select:none}.twk-hd b{font-size:12px;font-weight:600}.twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);width:22px;height:22px;border-radius:6px;cursor:pointer;font-size:13px}.twk-x:hover{background:rgba(0,0,0,.06)}.twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;min-height:0}.twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(41,38,27,.45);padding:8px 0 0}.twk-row{display:flex;flex-direction:column;gap:4px}.twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}.twk-lbl{font-weight:500;color:rgba(41,38,27,.72)}.twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;background:rgba(0,0,0,.15);transition:background .15s;cursor:pointer;padding:0}.twk-toggle[data-on="1"]{background:#b8956a}.twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}.twk-toggle[data-on="1"] i{transform:translateX(14px)}.twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;background:rgba(0,0,0,.06);user-select:none}.twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);transition:left .15s,width .15s}.twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;background:transparent;cursor:pointer;padding:4px 6px;font-size:11px;border-radius:6px}`;

function useTweaks(defaults){
  const[values,setValues]=React.useState(defaults);
  const setTweak=React.useCallback((k,v)=>{const edits=typeof k==='object'?k:{[k]:v};setValues(p=>({...p,...edits}));window.parent.postMessage({type:'__edit_mode_set_keys',edits},'*');},[]);
  return[values,setTweak];
}
function TweaksPanel({title='Tweaks',children}){
  const[open,setOpen]=React.useState(false);
  React.useEffect(()=>{
    const onMsg=e=>{if(e?.data?.type==='__activate_edit_mode')setOpen(true);if(e?.data?.type==='__deactivate_edit_mode')setOpen(false);};
    window.addEventListener('message',onMsg);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',onMsg);
  },[]);
  const dismiss=()=>{setOpen(false);window.parent.postMessage({type:'__edit_mode_dismissed'},'*');};
  if(!open)return null;
  return<><style>{__TWK_CSS}</style>
    <div className="twk-panel">
      <div className="twk-hd"><b>{title}</b><button className="twk-x" onClick={dismiss}>✕</button></div>
      <div className="twk-body">{children}</div>
    </div></>;
}
function TweakSection({title,children}){return<><div className="twk-sect">{title}</div>{children}</>;}
function TweakToggle({label,value,onChange}){return<div className="twk-row twk-row-h"><span className="twk-lbl">{label}</span><button className="twk-toggle" data-on={value?'1':'0'} onClick={()=>onChange(!value)}><i/></button></div>;}
function TweakRadio({label,value,options,onChange}){
  const opts=options.map(o=>typeof o==='object'?o:{value:o,label:o});
  const idx=Math.max(0,opts.findIndex(o=>o.value===value));
  const n=opts.length;
  return<div className="twk-row"><span className="twk-lbl">{label}</span>
    <div className="twk-seg">
      <div className="twk-seg-thumb" style={{left:`calc(2px + ${idx}*(100% - 4px)/${n})`,width:`calc((100% - 4px)/${n})`}}/>
      {opts.map(o=><button key={o.value} onClick={()=>onChange(o.value)}>{o.label}</button>)}
    </div>
  </div>;
}
</script>

<!-- ⑩ App shell -->
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#b8956a",
  "showWatermark": true,
  "cabineEntryMode": "drawer",
  "motionLevel": "default",
  "motionDemo": false
}/*EDITMODE-END*/;

const TABS=[
  {id:'vitrine',label:'Vitrine Pública',icon:'🛍'},
  {id:'admin',label:'Painel da Loja',icon:'🏪'},
  {id:'superadmin',label:'Super-Admin',icon:'⚙'},
  {id:'auth',label:'Auth & Onboarding',icon:'🔑'},
];

function App(){
  const[tab,setTab]=React.useState('vitrine');
  const[tweaks,setTweak]=useTweaks(TWEAK_DEFAULTS);
  const[lojaConfig,setLojaConfig]=React.useState({exibirPreco:false,fundoTipo:'branco',fundoImg:null});

  // Apply motion intensity to <html> so all CSS vars cascade
  React.useEffect(()=>{
    const lvl=tweaks.motionLevel||'default';
    document.documentElement.setAttribute('data-motion',lvl==='default'?'':lvl);
  },[tweaks.motionLevel]);

  return<div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
    <header style={{background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 20px',height:52,flexShrink:0,zIndex:100}}>
      <div style={{display:'flex',alignItems:'center',gap:2}}>
        {TABS.map(t=><button key={t.id} className={`vv-tab${tab===t.id?' on':''}`} onClick={()=>setTab(t.id)}>
          <span style={{fontSize:14}}>{t.icon}</span>{t.label}
        </button>)}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{display:'flex',alignItems:'center',gap:5,padding:'5px 11px',background:'#f0f9f3',borderRadius:16,border:'1px solid #c8e8d4'}}>
          <div style={{width:6,height:6,borderRadius:'50%',background:'#28c840'}}/>
          <span style={{fontFamily:F.sans,fontSize:11.5,fontWeight:500,color:'#3a7a4a'}}>v2 · Fluidez</span>
        </div>
      </div>
    </header>

    <div style={{flex:1,overflow:'hidden',position:'relative'}}>
      <div key={tab} className="vv-tab-pane" style={{height:'100%'}}>
        {tab==='vitrine'&&<PublicVitrine lojaConfig={lojaConfig}/>}
        {tab==='admin'&&<AdminPanel/>}
        {tab==='superadmin'&&<SuperAdmin/>}
        {tab==='auth'&&<AuthScreens/>}
      </div>
    </div>

    <TweaksPanel title="Tweaks">
      <TweakSection title="Vitrine">
        <TweakToggle label="Mostrar preços" value={lojaConfig.exibirPreco} onChange={v=>setLojaConfig(p=>({...p,exibirPreco:v}))}/>
        <TweakRadio label="Fundo do provador" value={lojaConfig.fundoTipo} options={[{value:'branco',label:'Branco'},{value:'personalizado',label:'Loja'}]} onChange={v=>setLojaConfig(p=>({...p,fundoTipo:v}))}/>
      </TweakSection>
      <TweakSection title="Motion">
        <TweakRadio label="Intensidade" value={tweaks.motionLevel||'default'} options={[{value:'calm',label:'Calmo'},{value:'default',label:'Padrão'},{value:'playful',label:'Vivo'}]} onChange={v=>setTweak('motionLevel',v)}/>
        <TweakToggle label="Reduzir motion" value={tweaks.motionLevel==='off'} onChange={v=>setTweak('motionLevel',v?'off':'default')}/>
      </TweakSection>
      <TweakSection title="Protótipo">
        <TweakToggle label="Watermark" value={tweaks.showWatermark} onChange={v=>setTweak('showWatermark',v)}/>
      </TweakSection>
    </TweaksPanel>
  </div>;
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
